name: Build & release

# Build native packages and attach them to a GitHub Release.
# PyInstaller can't cross-compile, so each platform is built on its own runner.
# Triggered by pushing a version tag (e.g. v3.1.4).
#
# NOTE: macOS *Intel* (x86_64) is NOT built here — GitHub's hosted macos-13
# runner queue is unreliable (hours-long waits). Build the Intel zip locally
# and attach it to the release with:  ./build-macos-intel.sh --upload
# (uses an x86_64 CPython under Rosetta; see the script header).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # manual runs build artifacts; publishing needs a tag

permissions:
  contents: write

jobs:
  # Apple Silicon (arm64) — the default macOS runner.
  macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build .app + zip (arm64)
        run: |
          ./build.sh
          for f in dist/Scholar-Dashboard-*-macos.zip; do mv "$f" "${f%-macos.zip}-macos-arm64.zip"; done
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/Scholar-Dashboard-*-macos-arm64.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install Inno Setup (for the .exe installer)
        run: choco install innosetup --no-progress -y
      - name: Build zip + installer
        shell: pwsh
        run: .\build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/Scholar-Dashboard-*-windows.zip
            dist/Scholar-Dashboard-*-setup.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build tarball
        run: ./build-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/Scholar-Dashboard-*-linux.tar.gz

  release:
    needs: [macos-arm64, windows, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
      - name: Prune old releases (keep newest 4)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[4:] | .[].tagName' \
          | while read -r tag; do
              [ -n "$tag" ] && gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            done
