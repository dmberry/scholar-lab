name: Build & release

# Build native packages on each OS and attach them to a GitHub Release.
# PyInstaller can't cross-compile, so each platform is built on its own
# runner. Triggered by pushing a version tag (e.g. v0.2.57), or manually.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip_intel:
        description: "Skip the slow macOS Intel build"
        type: boolean
        default: false
      tag:
        description: "Tag to publish under (e.g. v3.1). Required for a manual run to publish."
        type: string
        default: ""

permissions:
  contents: write

jobs:
  # Apple Silicon (arm64) — the default runner is Apple Silicon.
  macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build .app + zip (arm64)
        run: |
          ./build.sh
          for f in dist/Scholar-Dashboard-*-macos.zip; do mv "$f" "${f%-macos.zip}-macos-arm64.zip"; done
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/Scholar-Dashboard-*-macos-arm64.zip

  # Intel (x86_64) — macos-13 is the last Intel runner image. Its hosted-runner
  # queue is slow; a manual run can skip it via the skip_intel input.
  macos-intel:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_intel != 'true' }}
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build .app + zip (Intel)
        run: |
          ./build.sh
          for f in dist/Scholar-Dashboard-*-macos.zip; do mv "$f" "${f%-macos.zip}-macos-intel.zip"; done
      - uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: dist/Scholar-Dashboard-*-macos-intel.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install Inno Setup (for the .exe installer)
        run: choco install innosetup --no-progress -y
      - name: Build zip + installer
        shell: pwsh
        run: .\build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/Scholar-Dashboard-*-windows.zip
            dist/Scholar-Dashboard-*-setup.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build tarball
        run: ./build-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/Scholar-Dashboard-*-linux.tar.gz

  release:
    needs: [macos-arm64, macos-intel, windows, linux]
    runs-on: ubuntu-latest
    # Publish once the three fast OSes succeed; a skipped or failed Intel job
    # no longer blocks the release. Fires on a tag push, or on a manual run
    # that supplies a tag to publish under.
    if: >-
      ${{ !cancelled()
        && needs.macos-arm64.result == 'success'
        && needs.windows.result == 'success'
        && needs.linux.result == 'success'
        && (startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != '') }}
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
      - name: Prune old releases (keep newest 4)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[4:] | .[].tagName' \
          | while read -r tag; do
              [ -n "$tag" ] && gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            done
